pipelines:
  eventhub-tests:
    group: defaultGroup
    materials:
      git:
        git: https://github.com/Girjesh1101/PythonPlaywright.git
        branch: master
    stages:
      - build-image:
          jobs:
            docker-build:
              tasks:
                - exec:
                    command: sh
                    arguments:
                      - -c
                      - docker build -t playwright-tests .

      - run-tests:
          jobs:
            pytest-run:
              tasks:
                - exec:
                    command: sh
                    arguments:
                      - -c
                      - docker run --rm -v $(pwd)/allure-results:/app/allure-results playwright-tests || true
              artifacts:
                - build:
                    source: allure-results
                    destination: reports

      - deploy:
          approval: manual
          jobs:
            notify:
              tasks:
                - exec:
                    command: sh
                    arguments:
                      - -c
                      - echo "Pipeline completed! Check allure report for results."