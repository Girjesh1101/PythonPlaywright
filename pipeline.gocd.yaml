pipelines:
  eventhub-tests:
    group: defaultGroup
    materials:
      git:
        git: https://github.com/Girjesh1101/PythonPlaywright.git
        branch: master
    stages:
      - build-image:
          jobs:
            docker-build:
              tasks:
                - exec:
                    command: sh
                    arguments:
                      - -c
                      - docker build -t playwright-tests .

      - run-tests:
          jobs:
            pytest-run:
              tasks:
                - exec:
                    command: sh
                    arguments:
                      - -c
                      - docker run --name test-runner playwright-tests || true
                - exec:
                    command: sh
                    arguments:
                      - -c
                      - docker cp test-runner:/app/allure-results ./allure-results || true
                - exec:
                    command: sh
                    arguments:
                      - -c
                      - docker rm test-runner || true
                - exec:
                    command: sh
                    arguments:
                      - -c
                      - allure generate ./allure-results --clean -o ./allure-report
              artifacts:
                - build:
                    source: allure-results
                    destination: reports
                - build:
                    source: allure-report
                    destination: reports

      - deploy:
          approval: manual
          jobs:
            notify:
              tasks:
                - exec:
                    command: sh
                    arguments:
                      - -c
                      - echo "Pipeline completed! Check allure report for results."